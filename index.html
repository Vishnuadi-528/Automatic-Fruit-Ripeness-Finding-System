<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍎 Automatic Fruit Ripeness Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
        }
        
        .upload-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: transform 0.2s;
            display: inline-block;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .preview-container {
            margin: 20px 0;
            text-align: center;
        }
        
        #imagePreview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .result-container {
            margin-top: 30px;
            padding: 30px;
            border-radius: 15px;
            background: #f8f9ff;
            display: none;
        }
        
        .result-container.show {
            display: block;
            animation: slideIn 0.5s;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .ripeness-badge {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .ripeness-badge.green {
            background: #4ade80;
            color: white;
        }
        
        .ripeness-badge.yellow {
            background: #fbbf24;
            color: white;
        }
        
        .ripeness-badge.orange {
            background: #fb923c;
            color: white;
        }
        
        .ripeness-badge.yellow-green {
            background: #a3e635;
            color: white;
        }
        
        .ripeness-badge.light-green {
            background: #86efac;
            color: white;
        }
        
        .message {
            font-size: 1.2em;
            color: #333;
            margin: 15px 0;
            text-align: center;
        }
        
        .color-distribution {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .color-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .color-label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .color-percent {
            font-size: 1.5em;
            color: #667eea;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 Automatic Fruit Ripeness Detection</h1>
        <p class="subtitle">Upload a fruit image to analyze its ripening stage</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <h3>Click or Drag & Drop Image Here</h3>
            <p>Supports JPG, PNG formats</p>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        
        <div class="preview-container" id="previewContainer" style="display: none;">
            <img id="imagePreview" alt="Preview">
            <br>
            <button class="btn" id="analyzeBtn">Analyze Ripeness</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing fruit ripeness...</p>
        </div>
        
        <div class="result-container" id="resultContainer">
            <div style="text-align: center;">
                <div class="ripeness-badge" id="ripenessBadge"></div>
                <p class="message" id="message"></p>
            </div>
            
            <h3 style="margin-top: 30px; text-align: center;">Color Distribution Analysis</h3>
            <div class="color-distribution">
                <div class="color-item">
                    <div class="color-label" style="color: #22c55e;">🟢 Green (Unripe)</div>
                    <div class="color-percent" id="greenPercent">0%</div>
                </div>
                <div class="color-item">
                    <div class="color-label" style="color: #eab308;">🟡 Yellow (Ripe)</div>
                    <div class="color-percent" id="yellowPercent">0%</div>
                </div>
                <div class="color-item">
                    <div class="color-label" style="color: #f97316;">🟠 Orange</div>
                    <div class="color-percent" id="orangePercent">0%</div>
                </div>
                <div class="color-item">
                    <div class="color-label" style="color: #78350f;">🟤 Brown (Overripe)</div>
                    <div class="color-percent" id="brownPercent">0%</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loading = document.getElementById('loading');
        const resultContainer = document.getElementById('resultContainer');

        // Click to upload
        uploadArea.addEventListener('click', () => imageInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        // File input change
        imageInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                previewContainer.style.display = 'block';
                resultContainer.classList.remove('show');
            };
            reader.readAsDataURL(file);
        }

        // Analyze button
        analyzeBtn.addEventListener('click', async () => {
            const file = imageInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('image', file);

            loading.classList.add('show');
            resultContainer.classList.remove('show');

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                
                if (result.error) {
                    alert('Error: ' + result.error);
                    return;
                }

                displayResults(result);
            } catch (error) {
                alert('Error analyzing image: ' + error.message);
            } finally {
                loading.classList.remove('show');
            }
        });

        function displayResults(result) {
            const badge = document.getElementById('ripenessBadge');
            badge.textContent = result.stage;
            badge.className = 'ripeness-badge ' + result.color;

            document.getElementById('message').textContent = result.message;
            document.getElementById('greenPercent').textContent = result.color_distribution.green + '%';
            document.getElementById('yellowPercent').textContent = result.color_distribution.yellow + '%';
            document.getElementById('orangePercent').textContent = result.color_distribution.orange + '%';
            document.getElementById('brownPercent').textContent = result.color_distribution.brown + '%';

            resultContainer.classList.add('show');
        }
    </script>
</body>
</html>
